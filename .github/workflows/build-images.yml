name: Build and Push Container Images

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'src/troshkad/**'
      - 'deploy/containerfiles/**'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          echo "sha_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build backend image
        run: |
          podman build \
            -f deploy/containerfiles/Containerfile.backend \
            -t quay.io/redhat-gpte/troshka-backend:${{ steps.tags.outputs.sha_tag }} \
            -t quay.io/redhat-gpte/troshka-backend:latest \
            .

      - name: Tag version (if tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          podman tag \
            quay.io/redhat-gpte/troshka-backend:${{ steps.tags.outputs.sha_tag }} \
            quay.io/redhat-gpte/troshka-backend:${{ steps.tags.outputs.version_tag }}

      - name: Push to Quay.io
        run: |
          podman login -u="${{ secrets.QUAY_USERNAME }}" -p="${{ secrets.QUAY_PASSWORD }}" quay.io
          podman push quay.io/redhat-gpte/troshka-backend:${{ steps.tags.outputs.sha_tag }}
          podman push quay.io/redhat-gpte/troshka-backend:latest
          if [[ -n "${{ steps.tags.outputs.version_tag }}" ]]; then
            podman push quay.io/redhat-gpte/troshka-backend:${{ steps.tags.outputs.version_tag }}
          fi

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          echo "sha_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build frontend image
        run: |
          podman build \
            -f deploy/containerfiles/Containerfile.frontend \
            -t quay.io/redhat-gpte/troshka-frontend:${{ steps.tags.outputs.sha_tag }} \
            -t quay.io/redhat-gpte/troshka-frontend:latest \
            .

      - name: Tag version (if tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          podman tag \
            quay.io/redhat-gpte/troshka-frontend:${{ steps.tags.outputs.sha_tag }} \
            quay.io/redhat-gpte/troshka-frontend:${{ steps.tags.outputs.version_tag }}

      - name: Push to Quay.io
        run: |
          podman login -u="${{ secrets.QUAY_USERNAME }}" -p="${{ secrets.QUAY_PASSWORD }}" quay.io
          podman push quay.io/redhat-gpte/troshka-frontend:${{ steps.tags.outputs.sha_tag }}
          podman push quay.io/redhat-gpte/troshka-frontend:latest
          if [[ -n "${{ steps.tags.outputs.version_tag }}" ]]; then
            podman push quay.io/redhat-gpte/troshka-frontend:${{ steps.tags.outputs.version_tag }}
          fi
