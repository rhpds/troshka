name: Backend CI

on:
  push:
    branches: [main]
    paths: ['src/backend/**', '.github/workflows/ci-backend.yml']
  pull_request:
    branches: [main]
    paths: ['src/backend/**', '.github/workflows/ci-backend.yml']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: |
          count=$(mypy app/ --ignore-missing-imports 2>&1 | tail -1 | grep -oP '\d+(?= error)' || echo 0)
          echo "mypy: $count errors (baseline: 122)"
          if [ "$count" -gt 122 ]; then
            echo "::error::mypy errors increased from 122 to $count"
            exit 1
          fi

      - name: Run tests
        run: pytest tests/ -v --tb=short
