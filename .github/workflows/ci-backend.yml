name: Backend CI

on:
  push:
    branches: [main]
    paths: ['src/backend/**', '.github/workflows/ci-backend.yml']
  pull_request:
    branches: [main]
    paths: ['src/backend/**', '.github/workflows/ci-backend.yml']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with pyright
        run: |
          pip install pyright
          pyright app/

      - name: Run tests
        run: pytest tests/ -v --tb=short
