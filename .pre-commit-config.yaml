repos:
  # Security: Secret scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: |
          (?x)(
            \.secrets\.baseline|
            ^src/backend/tests/.*|
            ^src/backend/config/.*|
            ^src/backend/alembic/.*|
            ^src/frontend/.*|
            ^docs/.*|
            ^dev-services\.sh$|
            ^deploy/helm/templates/.*
          )

  # Security: Alternative secret detection
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  # Standard file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.md$
      - id: check-yaml
        args: ["--unsafe"]
        exclude: ^deploy/helm/templates/
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: debug-statements
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Python formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3
        files: ^src/backend/

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^src/backend/

  # Python type checking (backend) — matches CI pyright step
  - repo: local
    hooks:
      - id: pyright-backend
        name: Pyright check (backend)
        entry: bash -c 'cd src/backend && pyright app/'
        language: system
        files: ^src/backend/app/.*\.py$
        pass_filenames: false

  # TypeScript type checking (frontend) — matches CI next build
  - repo: local
    hooks:
      - id: tsc-frontend
        name: TypeScript check (frontend)
        entry: bash -c 'cd src/frontend && npx tsc --noEmit'
        language: system
        files: ^src/frontend/.*\.(ts|tsx)$
        pass_filenames: false

  # Spell checking
  - repo: https://github.com/crate-ci/typos
    rev: v1.17.2
    hooks:
      - id: typos
        exclude: |
          (?x)(
            \.git/|
            \.secrets\.baseline|
            package-lock\.json
          )

fail_fast: false
minimum_pre_commit_version: "2.20.0"
