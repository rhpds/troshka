---
- name: Generate MinIO credentials
  ansible.builtin.set_fact:
    _minio_root_user: troshka
    _minio_root_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=24') }}"

- name: Create MinIO PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: troshka-minio-data
        namespace: "{{ troshka_namespace }}"
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: "{{ troshka_minio_pvc_size }}"

- name: Deploy MinIO
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: troshka-minio
        namespace: "{{ troshka_namespace }}"
        labels:
          app.kubernetes.io/name: troshka-minio
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: troshka-minio
        template:
          metadata:
            labels:
              app.kubernetes.io/name: troshka-minio
          spec:
            containers:
              - name: minio
                image: quay.io/minio/minio:latest
                args: ["server", "/data", "--console-address", ":9001"]
                env:
                  - name: MINIO_ROOT_USER
                    value: "{{ _minio_root_user }}"
                  - name: MINIO_ROOT_PASSWORD
                    value: "{{ _minio_root_password }}"
                ports:
                  - containerPort: 9000
                    name: s3
                  - containerPort: 9001
                    name: console
                volumeMounts:
                  - name: data
                    mountPath: /data
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    memory: 2Gi
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: troshka-minio-data

- name: Create MinIO Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: troshka-minio
        namespace: "{{ troshka_namespace }}"
      spec:
        selector:
          app.kubernetes.io/name: troshka-minio
        ports:
          - port: 9000
            targetPort: 9000
            name: s3
          - port: 9001
            targetPort: 9001
            name: console

- name: Wait for MinIO to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: troshka-minio
    namespace: "{{ troshka_namespace }}"
  register: _minio
  until: (_minio.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Create bucket via init Job
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: "minio-init-bucket"
        namespace: "{{ troshka_namespace }}"
      spec:
        ttlSecondsAfterFinished: 300
        template:
          spec:
            restartPolicy: Never
            containers:
              - name: mc
                image: quay.io/minio/mc:latest
                command:
                  - /bin/sh
                  - -c
                  - |
                    mc alias set local http://troshka-minio:9000 {{ _minio_root_user }} {{ _minio_root_password }}
                    mc mb --ignore-existing local/troshka-images

- name: Wait for bucket init job
  kubernetes.core.k8s_info:
    api_version: batch/v1
    kind: Job
    name: minio-init-bucket
    namespace: "{{ troshka_namespace }}"
  register: _init_job
  until: (_init_job.resources[0].status.succeeded | default(0)) >= 1
  retries: 12
  delay: 10
