---
- name: Deploy PostgreSQL StatefulSet
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: troshka-postgres
        namespace: "{{ troshka_namespace }}"
        labels:
          app.kubernetes.io/name: troshka-postgres
      spec:
        serviceName: troshka-postgres
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: troshka-postgres
        template:
          metadata:
            labels:
              app.kubernetes.io/name: troshka-postgres
          spec:
            containers:
              - name: postgres
                image: "{{ troshka_postgres_image }}"
                ports:
                  - containerPort: 5432
                env:
                  - name: POSTGRESQL_USER
                    value: troshka
                  - name: POSTGRESQL_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: troshka-secrets
                        key: postgres-password
                  - name: POSTGRESQL_DATABASE
                    value: troshka
                volumeMounts:
                  - name: data
                    mountPath: /var/lib/pgsql/data
                readinessProbe:
                  exec:
                    command: ["pg_isready", "-U", "troshka", "-d", "troshka"]
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: "{{ troshka_postgres_storage_size }}"

- name: Create PostgreSQL Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: troshka-postgres
        namespace: "{{ troshka_namespace }}"
      spec:
        selector:
          app.kubernetes.io/name: troshka-postgres
        ports:
          - port: 5432
            targetPort: 5432
        clusterIP: None

- name: Wait for PostgreSQL to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: StatefulSet
    name: troshka-postgres
    namespace: "{{ troshka_namespace }}"
  register: _pg_sts
  until: (_pg_sts.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10
