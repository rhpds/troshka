---
- name: Deploy frontend
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: troshka-frontend
        namespace: "{{ troshka_namespace }}"
        labels:
          app.kubernetes.io/name: troshka-frontend
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: troshka-frontend
        template:
          metadata:
            labels:
              app.kubernetes.io/name: troshka-frontend
          spec:
            containers:
              - name: frontend
                image: "{{ troshka_frontend_image }}"
                ports:
                  - containerPort: 3000
                    name: http
                env:
                  - name: BACKEND_URL
                    value: "http://troshka-backend.{{ troshka_namespace }}.svc:8200"
                readinessProbe:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  requests:
                    cpu: "{{ troshka_frontend_cpu_request }}"
                    memory: 256Mi
                  limits:
                    memory: "{{ troshka_frontend_memory_limit }}"

- name: Create frontend Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: troshka-frontend
        namespace: "{{ troshka_namespace }}"
      spec:
        selector:
          app.kubernetes.io/name: troshka-frontend
        ports:
          - port: 3000
            targetPort: 3000
            name: http

- name: Create Route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: troshka
        namespace: "{{ troshka_namespace }}"
      spec:
        host: "{{ _troshka_route_host }}"
        tls:
          termination: "{{ 'reencrypt' if (troshka_oauth_enabled | bool) else 'edge' }}"
          insecureEdgeTerminationPolicy: Redirect
        to:
          kind: Service
          name: "{{ 'troshka-oauth-proxy' if (troshka_oauth_enabled | bool) else 'troshka-frontend' }}"
          weight: 100
        port:
          targetPort: "{{ 'proxy' if (troshka_oauth_enabled | bool) else 'http' }}"
