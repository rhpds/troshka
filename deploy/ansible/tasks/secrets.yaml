---
- name: Check if secrets exist
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: troshka-secrets
    namespace: "{{ troshka_namespace }}"
  register: _existing_secrets

- name: Generate and create secrets if not present
  when: _existing_secrets.resources | length == 0
  block:
    - name: Generate JWT secret
      ansible.builtin.set_fact:
        _jwt_secret: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=48') }}"

    - name: Generate encryption key
      ansible.builtin.set_fact:
        _encryption_key: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=44') }}"

    - name: Determine database URL
      ansible.builtin.set_fact:
        _db_url: >-
          {{ troshka_db_url if (troshka_db_url | default('', true) | length > 0)
             else 'postgresql+psycopg2://troshka:' ~ troshka_postgres_password ~ '@troshka-postgres.' ~ troshka_namespace ~ '.svc:5432/troshka' }}

    - name: Determine S3 credentials
      ansible.builtin.set_fact:
        _s3_access_key: "{{ troshka_s3_access_key if (troshka_s3_access_key | default('', true) | length > 0) else troshka_minio_root_user }}"
        _s3_secret_key: "{{ troshka_s3_secret_key if (troshka_s3_secret_key | default('', true) | length > 0) else troshka_minio_root_password }}"

    - name: Create secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: troshka-secrets
            namespace: "{{ troshka_namespace }}"
          type: Opaque
          stringData:
            database-url: "{{ _db_url }}"
            jwt-secret: "{{ _jwt_secret }}"
            encryption-key: "{{ _encryption_key }}"
            s3-access-key: "{{ _s3_access_key }}"
            s3-secret-key: "{{ _s3_secret_key }}"
