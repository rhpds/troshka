apiVersion: v1
kind: Secret
metadata:
  name: troshka-secrets
  namespace: troshka
type: Opaque
stringData:
  database-url: "postgresql+psycopg2://troshka:CHANGE_ME@troshka-postgres:5432/troshka"  # pragma: allowlist secret
  jwt-secret: "CHANGE_ME"  # pragma: allowlist secret
  encryption-key: "CHANGE_ME"  # pragma: allowlist secret
  s3-access-key: ""
  s3-secret-key: ""
