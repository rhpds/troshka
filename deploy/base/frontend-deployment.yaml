apiVersion: apps/v1
kind: Deployment
metadata:
  name: troshka-frontend
  namespace: troshka
  labels:
    app.kubernetes.io/name: troshka-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: troshka-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: troshka-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: quay.io/rhpds/troshka-frontend:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: BACKEND_URL
              value: "http://troshka-backend:8200"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: troshka-frontend
  namespace: troshka
  labels:
    app.kubernetes.io/name: troshka-frontend
spec:
  selector:
    app.kubernetes.io/name: troshka-frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
