{{- if .Values.deploy }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: troshka-backend
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: troshka-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: troshka-backend
        app.kubernetes.io/component: backend
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/backend-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: troshka-backend
      containers:
        - name: backend
          image: {{ include "troshka.backendImage" . }}
          ports:
            - containerPort: 8200
              name: http
          env:
            - name: TROSHKA_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: database-url
            - name: TROSHKA_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: jwt-secret
            - name: TROSHKA_AUTH__ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: encryption-key
            - name: TROSHKA_AWS__ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: s3-access-key
                  optional: true
            - name: TROSHKA_AWS__SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: s3-secret-key
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /opt/app-root/src/config/config.yaml
              subPath: config.yaml
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8200
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: troshka-config
{{- end }}
