{{- if .Values.deploy }}
apiVersion: v1
kind: Secret
metadata:
  name: troshka-secrets
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | default (printf "postgresql+psycopg2://troshka:%s@troshka-postgres:5432/troshka" (.Values.postgres.password | default "changeme")) | quote }}  # pragma: allowlist secret
  jwt-secret: {{ .Values.secrets.jwtSecret | default (randAlphaNum 48) | quote }}
  encryption-key: {{ .Values.secrets.encryptionKey | default (randAlphaNum 44) | quote }}
  {{- if .Values.secrets.s3AccessKey }}
  s3-access-key: {{ .Values.secrets.s3AccessKey | quote }}
  {{- end }}
  {{- if .Values.secrets.s3SecretKey }}
  s3-secret-key: {{ .Values.secrets.s3SecretKey | quote }}
  {{- end }}
{{- end }}
