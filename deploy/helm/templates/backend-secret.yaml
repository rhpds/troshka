{{- if .Values.deploy }}
{{- $existingSecret := (lookup "v1" "Secret" (include "troshka.namespace" .) "troshka-secrets") }}
{{- $pgPass := "" }}
{{- $jwtSecret := "" }}
{{- $encKey := "" }}
{{- if $existingSecret }}
  {{- $pgPass = index $existingSecret.data "postgres-password" | default "" | b64dec }}
  {{- $jwtSecret = index $existingSecret.data "jwt-secret" | default "" | b64dec }}
  {{- $encKey = index $existingSecret.data "encryption-key" | default "" | b64dec }}
{{- end }}
{{- if not $pgPass }}
  {{- $pgPass = .Values.postgres.password | default (randAlphaNum 24) }}
{{- end }}
{{- if not $jwtSecret }}
  {{- $jwtSecret = .Values.secrets.jwtSecret | default (randAlphaNum 48) }}
{{- end }}
{{- if not $encKey }}
  {{- $encKey = .Values.secrets.encryptionKey | default (randAlphaNum 44) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: troshka-secrets
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | default (printf "postgresql+psycopg2://troshka:%s@troshka-postgres:5432/troshka" $pgPass) | quote }}  # pragma: allowlist secret
  postgres-password: {{ $pgPass | quote }}
  jwt-secret: {{ $jwtSecret | quote }}
  encryption-key: {{ $encKey | quote }}
  {{- if .Values.secrets.s3AccessKey }}
  s3-access-key: {{ .Values.secrets.s3AccessKey | quote }}
  {{- end }}
  {{- if .Values.secrets.s3SecretKey }}
  s3-secret-key: {{ .Values.secrets.s3SecretKey | quote }}
  {{- end }}
{{- end }}
