{{- if .Values.deploy }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: troshka-frontend
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: troshka-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: troshka-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "troshka.frontendImage" . }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: BACKEND_URL
              value: "http://troshka-backend:8200"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
{{- end }}
