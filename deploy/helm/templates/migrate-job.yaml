{{- if .Values.deploy }}
apiVersion: batch/v1
kind: Job
metadata:
  name: troshka-migrate-{{ .Release.Revision }}
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: troshka-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "troshka.backendImage" . }}
          command: ["python3", "-m", "alembic", "upgrade", "head"]
          workingDir: /opt/app-root/src
          env:
            - name: TROSHKA_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: database-url
          volumeMounts:
            - name: config
              mountPath: /opt/app-root/src/config/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: troshka-config
{{- end }}
