{{- if .Values.deploy }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: troshka-group-reader
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
rules:
  - apiGroups: ["user.openshift.io"]
    resources: ["groups"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: troshka-group-reader
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: troshka-group-reader
subjects:
  - kind: ServiceAccount
    name: troshka-backend
    namespace: {{ include "troshka.namespace" . }}
{{- end }}
