{{- if and .Values.deploy .Values.s4.deploy }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: troshka-s4
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: troshka-s4
  template:
    metadata:
      labels:
        app.kubernetes.io/name: troshka-s4
        app.kubernetes.io/component: storage
    spec:
      containers:
        - name: s4
          image: {{ .Values.s4.image }}
          ports:
            - containerPort: 7480
              name: s3
            - containerPort: 5000
              name: ui
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: s3-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: s3-secret-key
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: troshka-s4-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: troshka-s4-data
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.s4.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: troshka-s4
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  selector:
    app.kubernetes.io/name: troshka-s4
  ports:
    - port: 7480
      targetPort: 7480
      name: s3
    - port: 5000
      targetPort: 5000
      name: ui
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: troshka-s4
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  to:
    kind: Service
    name: troshka-s4
  port:
    targetPort: s3
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: batch/v1
kind: Job
metadata:
  name: troshka-s4-init
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-s4
          image: {{ include "troshka.backendImage" . }}
          command: ["bash", "-c"]
          args:
            - |
              echo "Waiting for S4..."
              until bash -c 'echo > /dev/tcp/troshka-s4/7480' 2>/dev/null; do
                sleep 2
              done
              echo "S4 is ready"
      containers:
        - name: setup-s4
          image: {{ .Values.s4.image }}
          command: ["bash", "-c"]
          args:
            - |
              set -e
              # Create troshka user (idempotent — radosgw-admin modify if exists)
              if radosgw-admin user info --uid=troshka 2>/dev/null; then
                echo "User troshka already exists"
              else
                radosgw-admin user create --uid=troshka --display-name="Troshka" \
                  --access-key="$S3_ACCESS_KEY" --secret-key="$S3_SECRET_KEY"
                echo "Created user troshka"
              fi

              # Remove insecure default s4admin user
              if radosgw-admin user info --uid=s4admin 2>/dev/null; then
                radosgw-admin user rm --uid=s4admin
                echo "Removed default s4admin user"
              fi

              # Create bucket via S3 API
              python3 -c "
              import boto3, os
              client = boto3.client('s3',
                  region_name='us-east-1',
                  aws_access_key_id=os.environ['S3_ACCESS_KEY'],
                  aws_secret_access_key=os.environ['S3_SECRET_KEY'],
                  endpoint_url='http://troshka-s4:7480',
              )
              bucket = '{{ .Values.s3.bucket }}'
              try:
                  client.create_bucket(Bucket=bucket)
                  print(f'Bucket {bucket} created')
              except Exception as e:
                  if 'BucketAlreadyExists' in str(e) or 'BucketAlreadyOwnedByYou' in str(e):
                      print(f'Bucket {bucket} already exists')
                  else:
                      raise
              "
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: s3-secret-key
{{- end }}
