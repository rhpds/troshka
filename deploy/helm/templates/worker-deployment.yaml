{{- if .Values.deploy }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: troshka-worker
  namespace: {{ include "troshka.namespace" . }}
  labels:
    {{- include "troshka.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: troshka-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: troshka-worker
        app.kubernetes.io/component: worker
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/backend-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: troshka-backend
      containers:
        - name: worker
          image: {{ include "troshka.backendImage" . }}
          command: ["python3", "-m", "app.workers.deploy_worker"]
          env:
            - name: TROSHKA_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: database-url
            - name: TROSHKA_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: jwt-secret
            - name: TROSHKA_AUTH__ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: encryption-key
            - name: TROSHKA_AWS__ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: s3-access-key
                  optional: true
            - name: TROSHKA_AWS__SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: troshka-secrets
                  key: s3-secret-key
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /opt/app-root/src/config/config.yaml
              subPath: config.yaml
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: troshka-config
{{- end }}
