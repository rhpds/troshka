apiVersion: apps/v1
kind: Deployment
metadata:
  name: troshka-minio
  namespace: troshka
  labels:
    app.kubernetes.io/name: troshka-minio
    app.kubernetes.io/component: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: troshka-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: troshka-minio
        app.kubernetes.io/component: storage
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: troshka-minio-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: troshka-minio-data
  namespace: troshka
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
