---
- name: Deploy central MinIO for Troshka gold images
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minio_namespace: troshka-images
    minio_root_user: troshka
    minio_pvc_size: 200Gi
    minio_bucket: troshka-gold-images
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('~/secrets/ocpv-infra01.kubeconfig') }}"

  tasks:
    - name: Create namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ minio_namespace }}"

    - name: Check if MinIO secret exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Secret
        name: minio-credentials
        namespace: "{{ minio_namespace }}"
      register: _existing_secret

    - name: Generate MinIO root password
      when: _existing_secret.resources | length == 0
      block:
        - name: Generate password
          ansible.builtin.set_fact:
            _minio_root_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"

        - name: Create MinIO secret
          kubernetes.core.k8s:
            kubeconfig: "{{ kubeconfig }}"
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: minio-credentials
                namespace: "{{ minio_namespace }}"
              type: Opaque
              stringData:
                root-user: "{{ minio_root_user }}"
                root-password: "{{ _minio_root_password }}"

    - name: Create MinIO PVC
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: minio-data
            namespace: "{{ minio_namespace }}"
          spec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: "{{ minio_pvc_size }}"

    - name: Deploy MinIO
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: minio
            namespace: "{{ minio_namespace }}"
            labels:
              app.kubernetes.io/name: minio
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: minio
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: minio
              spec:
                containers:
                  - name: minio
                    image: quay.io/minio/minio:latest
                    args: ["server", "/data", "--console-address", ":9001"]
                    env:
                      - name: MINIO_ROOT_USER
                        valueFrom:
                          secretKeyRef:
                            name: minio-credentials
                            key: root-user
                      - name: MINIO_ROOT_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: minio-credentials
                            key: root-password
                    ports:
                      - containerPort: 9000
                        name: s3
                      - containerPort: 9001
                        name: console
                    volumeMounts:
                      - name: data
                        mountPath: /data
                    resources:
                      requests:
                        cpu: 250m
                        memory: 512Mi
                      limits:
                        memory: 2Gi
                volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: minio-data

    - name: Create MinIO Service
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: minio
            namespace: "{{ minio_namespace }}"
          spec:
            selector:
              app.kubernetes.io/name: minio
            ports:
              - port: 9000
                targetPort: 9000
                name: s3
              - port: 9001
                targetPort: 9001
                name: console

    - name: Create MinIO Route (S3 API)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: minio
            namespace: "{{ minio_namespace }}"
          spec:
            host: "minio-{{ minio_namespace }}.apps.ocpv-infra01.dal12.infra.demo.redhat.com"
            to:
              kind: Service
              name: minio
            port:
              targetPort: s3
            tls:
              termination: edge

    - name: Wait for MinIO to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: apps/v1
        kind: Deployment
        name: minio
        namespace: "{{ minio_namespace }}"
      register: _minio_deploy
      until: (_minio_deploy.resources[0].status.readyReplicas | default(0)) >= 1
      retries: 30
      delay: 10

    - name: Create bucket via mc init job
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: "minio-init-bucket"
            namespace: "{{ minio_namespace }}"
          spec:
            ttlSecondsAfterFinished: 300
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: mc
                    image: quay.io/minio/mc:latest
                    command:
                      - /bin/sh
                      - -c
                      - |
                        export HOME=/tmp
                        mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
                        mc mb --ignore-existing local/{{ minio_bucket }}
                    env:
                      - name: MINIO_ROOT_USER
                        valueFrom:
                          secretKeyRef:
                            name: minio-credentials
                            key: root-user
                      - name: MINIO_ROOT_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: minio-credentials
                            key: root-password

    - name: Print access info
      ansible.builtin.debug:
        msg: |
          Central MinIO deployed!
          Endpoint: https://minio-{{ minio_namespace }}.apps.ocpv-infra01.dal12.infra.demo.redhat.com
          Bucket: {{ minio_bucket }}
          Credentials: stored in secret minio-credentials in namespace {{ minio_namespace }}

          To upload gold images, port-forward and use mc:
            oc port-forward -n {{ minio_namespace }} svc/minio 9000:9000
            mc alias set central http://localhost:9000 <user> <password>
            mc cp prebuilt-rhel-10.2-bastion.qcow2 central/{{ minio_bucket }}/
            mc cp rhel-10.2-x86_64-kvm.qcow2 central/{{ minio_bucket }}/
            mc cp rhel-10.2-x86_64-dvd.iso central/{{ minio_bucket }}/
