apiVersion: v1
kind: Namespace
metadata:
  name: troshka
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: troshka
  namespace: troshka
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: troshka-provider
rules:
  # KubeVirt VMs — full lifecycle
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines"]
    verbs: ["create", "delete", "get", "list", "patch"]
  # KubeVirt VMIs — read + delete (delete for restart/force-stop)
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachineinstances"]
    verbs: ["get", "list", "delete"]
  # KubeVirt subresources — VNC console, serial console, exec
  - apiGroups: ["subresources.kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances", "virtualmachineinstances/vnc", "virtualmachineinstances/console", "virtualmachineinstances/exec"]
    verbs: ["get"]
  # CDI DataVolumes — created via VM dataVolumeTemplates
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes"]
    verbs: ["create", "delete", "get", "list"]
  # Services — NodePort for SSH/agent, ClusterIP for vncd, EIP port forwards
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "delete", "get", "list", "patch"]
  # PVCs — Ceph-NFS storage pools, extend
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "delete", "get", "list", "patch"]
  # PVs — read NFS endpoint from bound PV
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list"]
  # Routes — console edge termination
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["create", "delete", "get", "list"]
  # Secrets — cloud-init userdata
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get"]
  # Namespace — ensure troshka namespace exists
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create"]
  # Nodes — find IPs for NodePort access
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Pods — find Rook toolbox for ceph commands, operator helper pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list"]
  # Pod exec — run ceph CLI in Rook toolbox (NFS export management)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  # ConfigMaps — dnsmasq config for kubevirt native
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete", "get", "list"]
  # CRDs — kubevirt native operator install
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["create", "delete", "get", "list", "patch"]
  # Troshka CRDs — kubevirt native operator
  - apiGroups: ["troshka.redhat.com"]
    resources: ["troshkaprojects", "troshkanetworks", "troshkavms"]
    verbs: ["create", "delete", "get", "list", "patch"]
  - apiGroups: ["troshka.redhat.com"]
    resources: ["troshkaprojects/status", "troshkanetworks/status", "troshkavms/status"]
    verbs: ["get", "patch"]
  # Deployments — operator install
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "get", "list", "patch"]
  # RBAC — operator install (ClusterRole, ClusterRoleBinding, ServiceAccount)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["create", "delete", "get", "patch"]
  # ServiceAccounts — operator install
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["create", "delete", "get"]
  # NetworkAttachmentDefinitions — kubevirt native OVN networks
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["net-attach-defs"]
    verbs: ["create", "delete", "get", "list"]
  # VolumeSnapshots — pattern capture
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["create", "delete", "get", "list"]
  # Jobs — guestfish, PXE init, pattern export
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list"]
  # Events — operator progress reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: troshka-provider
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: troshka-provider
subjects:
  - kind: ServiceAccount
    name: troshka
    namespace: troshka
---
# Custom SCC for exec into virt-launcher pods (guest-agent exec).
# Mirrors kubevirt-controller SCC: RunAsAny uid/fsGroup, NET_BIND_SERVICE
# + SYS_NICE caps, KubeVirt seccomp profile. No hostPID/hostNetwork/hostIPC.
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: troshka-virt-exec
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: false
allowedCapabilities:
  - SYS_NICE
  - NET_BIND_SERVICE
fsGroup:
  type: RunAsAny
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
seccompProfiles:
  - runtime/default
  - unconfined
  - localhost/kubevirt/kubevirt.json
supplementalGroups:
  type: RunAsAny
volumes:
  - "*"
users:
  - system:serviceaccount:troshka:troshka
---
# Privileged SCC for recert Jobs — needs qemu-nbd device access, mount (SYS_ADMIN),
# and SELinux RunAsAny to access disk content. Used by troshka-recert SA per project namespace.
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: troshka-privileged-jobs
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: true
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: true
allowedCapabilities:
  - SYS_ADMIN
  - NET_ADMIN
fsGroup:
  type: RunAsAny
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - downwardAPI
users: []
