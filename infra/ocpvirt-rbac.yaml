apiVersion: v1
kind: Namespace
metadata:
  name: troshka
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: troshka
  namespace: troshka
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: troshka-provider
rules:
  # KubeVirt VMs — full lifecycle
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines"]
    verbs: ["create", "delete", "get", "list", "patch"]
  # KubeVirt VMIs — read-only for status checks
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachineinstances"]
    verbs: ["get", "list"]
  # CDI DataVolumes — created via VM dataVolumeTemplates
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes"]
    verbs: ["create", "delete", "get", "list"]
  # Services — NodePort for SSH/agent, ClusterIP for vncd
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "delete", "get", "list"]
  # PVCs — Ceph-NFS storage pools, extend
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "delete", "get", "list", "patch"]
  # PVs — read NFS endpoint from bound PV
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list"]
  # Routes — console edge termination
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["create", "delete", "get", "list"]
  # Secrets — cloud-init userdata
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get"]
  # Namespace — ensure troshka namespace exists
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create"]
  # Nodes — find IPs for NodePort access
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Pods — find Rook toolbox for ceph commands
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Pod exec — run ceph CLI in Rook toolbox (NFS export management)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: troshka-provider
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: troshka-provider
subjects:
  - kind: ServiceAccount
    name: troshka
    namespace: troshka
