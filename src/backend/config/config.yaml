app:
  name: troshka
  port: 8200
  host: "0.0.0.0"
  log_level: info
  root_path: ""

database:
  url: "postgresql+psycopg2://troshka:troshka@localhost:5432/troshka"

redis:
  url: "redis://localhost:6379/0"

auth:
  jwt_secret: "CHANGE-ME-IN-LOCAL-CONFIG"
  jwt_algorithm: "HS256"
  jwt_expiry_hours: 24
  oauth_enabled: false
  allow_registration: true
  admin_users: "prutledg@redhat.com"
  operator_users: ""
  allowed_groups: ""
  admin_groups: ""
  operator_groups: ""

s3:
  bucket: "troshka-images"
  region: "us-east-1"
  endpoint_url: ""

aws:
  profile: ""
  access_key_id: ""
  secret_access_key: ""
  default_region: "us-east-1"
  default_instance_type: "r8i.4xlarge"
  default_ami: ""
  vpc_id: ""
  subnet_id: ""
  security_group_id: ""
  key_pair_name: ""

defaults:
  run_timer_hours: 8
  lifetime_days: 30
  max_vms_per_project: 20
  max_projects_per_user: 10
  user_library_quota_gb: 500
