app:
  name: troshka
  port: 8200
  host: "0.0.0.0"
  log_level: info
  root_path: ""
  external_url: ""

database:
  url: "postgresql+psycopg2://troshka:troshka@localhost:5433/troshka"

redis:
  url: "redis://localhost:6379/0"

auth:
  jwt_secret: "CHANGE-ME-IN-LOCAL-CONFIG"
  jwt_algorithm: "HS256"
  jwt_expiry_hours: 24
  oauth_enabled: false
  allow_registration: true
  admin_users: "prutledg@redhat.com"
  operator_users: ""
  allowed_groups: ""
  admin_groups: ""
  operator_groups: ""

aws:
  default_region: "us-east-1"
  default_instance_type: "m8i.xlarge"

defaults:
  run_timer_hours: 8
  lifetime_days: 30
  max_vms_per_project: 20
  max_projects_per_user: 10
  user_library_quota_gb: 500

overcommit:
  cpu_ratio: 4.0
  ram_ratio: 1.5

gc:
  cache_stale_hours_patterns: 24
  cache_stale_hours_snapshots: 1
  cache_stale_hours_images: 1
