name: ocp-cluster
description: OpenShift cluster (configurable topology)
versions: ["4.14", "4.15", "4.16", "4.17"]
parameters:
  control_count:
    default: 3
    min: 1
    description: Number of control plane nodes
  control_vcpus:
    default: 4
    min: 4
  control_ram_gb:
    default: 16
    min: 16
  control_disk_gb:
    default: 120
    min: 100
  control_schedulable:
    default: true
    description: Whether control plane nodes accept workload scheduling
  worker_count:
    default: 0
    min: 0
  worker_vcpus:
    default: 4
    min: 4
  worker_ram_gb:
    default: 16
    min: 16
  worker_disk_gb:
    default: 120
    min: 100
bastion:
  vcpus: 2
  ram_gb: 4
  disk_gb: 50
  image: rhel-10
networks:
  cluster:
    cidr: 10.0.0.0/24
    dhcp: true
  bmc:
    cidr: 192.168.100.0/24
