name: ocp-compact
display_name: "OpenShift Compact 3-Node (Agent Installer)"
description: "3 combined CP + worker nodes — 4 vCPU, 16 GB, 120 GB each"
category: openshift
install_method: agent
deploy_time: "~25 min"
extends: ocp-cluster
defaults:
  control_count: 3
  control_vcpus: 4
  control_ram_gb: 16
  control_disk_gb: 120
  control_schedulable: true
  worker_count: 0
