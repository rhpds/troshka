name: ocp-ran-5g
display_name: "5G RAN Lab (ACM + ZTP + GitOps)"
description: "Hub cluster + 3 blank SNO targets for 5G RAN RDS Deployments lab"
category: openshift
install_method: agent
deploy_time: "~45 min (hub) + ~60 min (seed SNO via ACM)"

networks:
  cluster:
    cidr: 192.168.125.0/24
    dhcp: true
    domain: 5g-deployment.lab
  bmc:
    cidr: 192.168.50.0/24
    type: bmc
  sriov:
    cidr: 192.168.100.0/24
  ptp:
    cidr: 192.168.200.0/24

gateway:
  outbound_ports: [53, 80, 443, 123, icmp]

vms:
  hub-cp-0:
    role: control-plane
    vcpus: 16
    ram_gb: 48
    os: rhcos
    firmware: uefi
    bmc_ip: 192.168.50.10
    disks:
      - size_gb: 120
      - size_gb: 120
    nics:
      - network: cluster
        model: virtio
        ip: 192.168.125.10
      - network: bmc
        model: virtio
      - network: ptp
        model: igb

  bastion:
    role: bastion
    vcpus: 4
    ram_gb: 8
    os: rhel-10
    firmware: uefi
    disks:
      - size_gb: 100
    nics:
      - network: cluster
        model: virtio
        ip: 192.168.125.50
      - network: bmc
        model: virtio

  sno-seed:
    role: blank
    vcpus: 12
    ram_gb: 24
    os: blank
    firmware: uefi
    power_on: false
    bmc: true
    disks:
      - size_gb: 200
      - size_gb: 200
    nics:
      - network: cluster
        model: virtio
        ip: 192.168.125.20
      - network: ptp
        model: igb
      - network: sriov
        model: igb
      - network: sriov
        model: igb

  sno-abi:
    role: blank
    vcpus: 12
    ram_gb: 24
    os: blank
    firmware: uefi
    power_on: false
    bmc: true
    disks:
      - size_gb: 200
      - size_gb: 200
    nics:
      - network: cluster
        model: virtio
        ip: 192.168.125.21
      - network: ptp
        model: igb
      - network: sriov
        model: igb
      - network: sriov
        model: igb

  sno-ibi:
    role: blank
    vcpus: 12
    ram_gb: 24
    os: blank
    firmware: uefi
    power_on: false
    bmc: true
    disks:
      - size_gb: 200
      - size_gb: 200
    nics:
      - network: cluster
        model: virtio
        ip: 192.168.125.22
      - network: ptp
        model: igb
      - network: sriov
        model: igb
      - network: sriov
        model: igb
