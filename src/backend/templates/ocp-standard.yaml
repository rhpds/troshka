name: ocp-standard
display_name: "OpenShift Standard 3+2 (Agent Installer)"
description: "3 CP (4 vCPU, 16 GB, 120 GB) + 2 workers (4 vCPU, 16 GB, 120 GB)"
category: openshift
install_method: agent
deploy_time: "~30 min"
extends: ocp-cluster
defaults:
  control_count: 3
  control_vcpus: 4
  control_ram_gb: 16
  control_disk_gb: 120
  control_schedulable: false
  worker_count: 2
  worker_vcpus: 4
  worker_ram_gb: 16
  worker_disk_gb: 120
