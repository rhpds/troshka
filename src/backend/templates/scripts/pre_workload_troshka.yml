---
# Troshka-specific pre_workload for 5G RAN lab
# Replaces the kcli/libvirt-based pre_workload
# Infrastructure (VMs, networks, sushy, libvirt) handled by Troshka
# This sets up: registry, mirror, Gitea, MinIO, dnsmasq, Showroom, users

- name: Fail if pull-secret var is empty
  ansible.builtin.assert:
    that:
      - ocp4_pull_secret is defined
      - ocp4_pull_secret | default("") | length > 0
    fail_msg: ocp4_pull_secret variable must be defined

- name: Define facts
  ansible.builtin.set_fact:
    bastion_public_hostname: "{{ hostvars[groups['bastions'][0]]['public_dns_name'] | default(ansible_hostname) }}"
    bastion_ssh_password: "{{ student_password }}"
    bastion_ssh_user_name: "{{ student_name }}"

# ── kcli for disconnected registry/mirror ──

- name: Install kcli RPM
  ansible.builtin.dnf:
    name: "{{ kcli_rpm }}"
    disable_gpg_check: true

- name: Ensure disconnected registry folders exist
  ansible.builtin.file:
    path: /opt/registry/{{ item }}
    state: directory
    mode: "0755"
  loop:
    - auth
    - certs
    - data
    - conf

- name: Ensure disconnected registry config files exist
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.destination }}"
    mode: "{{ item.mode }}"
  retries: 5
  delay: 10
  loop:
    - {url: "https://raw.githubusercontent.com/{{ repo_user }}/5g-ran-deployments-on-ocp-lab/{{ lab_version }}/lab-materials/lab-env-data/registry/registry-key.pem", destination: "/opt/registry/certs/registry-key.pem", mode: "0644"}
    - {url: "https://raw.githubusercontent.com/{{ repo_user }}/5g-ran-deployments-on-ocp-lab/{{ lab_version }}/lab-materials/lab-env-data/registry/registry-cert.pem", destination: "/opt/registry/certs/registry-cert.pem", mode: "0644"}
    - {url: "https://raw.githubusercontent.com/{{ repo_user }}/5g-ran-deployments-on-ocp-lab/{{ lab_version }}/lab-materials/lab-env-data/registry/config.yml", destination: "/opt/registry/conf/config.yml", mode: "0644"}
    - {url: "https://raw.githubusercontent.com/{{ repo_user }}/5g-ran-deployments-on-ocp-lab/{{ lab_version }}/lab-materials/lab-env-data/registry/podman-registry.service", destination: "/etc/systemd/system/podman-registry.service", mode: "0644"}

- name: Ensure disconnected registry user credentials exist
  community.general.htpasswd:
    path: /opt/registry/auth/htpasswd
    crypt_scheme: bcrypt
    name: admin
    password: '{{ common_password }}'
    mode: 0640

- name: Ensure disconnected registry service is enabled and running
  ansible.builtin.systemd:
    state: restarted
    daemon_reload: true
    enabled: true
    name: podman-registry

- name: Ensure disconnected registry cert is trusted
  ansible.builtin.copy:
    src: "/opt/registry/certs/registry-cert.pem"
    dest: "/etc/pki/ca-trust/source/anchors/registry-cert.pem"
    mode: "0755"
    remote_src: true

- name: Ensure trusted certs are updated
  ansible.builtin.command:
    cmd: update-ca-trust extract

- name: Wait for registry
  ansible.builtin.wait_for:
    port: "{{ lab_registry_host.split(':')[1] }}"
    host: "{{ lab_registry_host.split(':')[0] }}"
    delay: 0
    sleep: 10
    timeout: 60

- name: Ensure registry is running by login into it
  containers.podman.podman_login:
    username: admin
    password: '{{ common_password }}'
    registry: "{{ lab_registry_host }}"
    authfile: auth.json

- name: Ensure pull secret is copied to the bastion host
  ansible.builtin.copy:
    content: "{{ ocp4_pull_secret }}"
    dest: "/root/openshift_pull.json"
    mode: '0644'

- name: Merge registry credentials into pull secret
  ansible.builtin.shell: |
    python3 -c "
    import json, base64
    ps = json.load(open('/root/openshift_pull.json'))
    key = base64.b64encode(b'admin:{{ common_password }}').decode()
    ps['auths']['{{ lab_registry_host }}'] = {'auth': key}
    json.dump(ps, open('/root/openshift_pull.json', 'w'))
    "
    mkdir -p /root/.docker
    cp /root/openshift_pull.json /root/.docker/config.json

- name: Download oc-mirror
  ansible.builtin.command:
    cmd: "kcli download oc-mirror -P version=stable -P tag='{{ ocp4_major_release }}'"
  register: oc_mirror_result
  failed_when: oc_mirror_result.rc != 0 and "already exists" not in oc_mirror_result.stderr
  changed_when: oc_mirror_result.rc == 0

- name: Copy oc-mirror to PATH
  ansible.builtin.copy:
    src: oc-mirror
    dest: /usr/bin/oc-mirror
    mode: "0755"
    remote_src: true
    force: false

- name: Create mirror config
  ansible.builtin.copy:
    dest: /root/mirror-config.yaml
    content: |
      apiVersion: mirror.openshift.io/v2alpha1
      kind: ImageSetConfiguration
      mirror:
        additionalImages:
        - name: registry.redhat.io/openshift4/ztp-site-generate-rhel8:v4.20.0-1
        - name: registry.redhat.io/rhacm2/multicluster-operators-subscription-rhel9:v2.15.0-1
        operators:
        - catalog: registry.redhat.io/redhat/redhat-operator-index:v{{ ocp4_major_release }}
          packages:
          {% for op in disconnected_operators %}
          - name: {{ op.name }}
            {% if op.channels is defined %}
            channels:
            {% for ch in op.channels %}
            - name: {{ ch.name }}
            {% endfor %}
            {% endif %}
          {% endfor %}

- name: Run oc-mirror
  ansible.builtin.shell:
    cmd: >
      cd /root &&
      oc-mirror --v2 --workspace file://
      --config=mirror-config.yaml
      docker://{{ lab_registry_host }}
    chdir: /root
  register: mirror_result
  failed_when: "'some errors occurred' in mirror_result.stdout"

- name: Apply mirror manifests to cluster
  kubernetes.core.k8s:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    state: present
    src: "{{ item }}"
  with_fileglob:
    - /root/working-dir/cluster-resources/*.yaml

- name: Create catalog source alias for golden image compatibility
  kubernetes.core.k8s:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: CatalogSource
      metadata:
        name: "cs-redhat-operator-index-v{{ ocp4_major_release | replace('.', '-') }}-176943"
        namespace: openshift-marketplace
      spec:
        displayName: Red Hat Operators
        image: "{{ lab_registry_host }}/redhat/redhat-operator-index:v{{ ocp4_major_release }}"
        publisher: Red Hat
        sourceType: grpc
        updateStrategy:
          registryPoll:
            interval: 1h

- name: Add registry credentials to cluster pull secret
  ansible.builtin.shell: |
    export KUBECONFIG=/home/{{ student_name }}/hub-kubeconfig
    oc get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d | \
      python3 -c "import json,sys,base64; d=json.load(sys.stdin); d['auths']['{{ lab_registry_host }}']={'auth':base64.b64encode(b'admin:{{ common_password }}').decode()}; json.dump(d,sys.stdout)" \
      > /tmp/merged-pull-secret.json
    oc set data secret pull-secret -n openshift-config --from-file=.dockerconfigjson=/tmp/merged-pull-secret.json

- name: Trust registry cert on cluster
  ansible.builtin.shell: |
    export KUBECONFIG=/home/{{ student_name }}/hub-kubeconfig
    oc create configmap registry-cas --from-file={{ lab_registry_host | replace(':', '..') }}=/opt/registry/certs/registry-cert.pem -n openshift-config 2>/dev/null || true
    oc patch image.config.openshift.io/cluster --type merge -p '{"spec":{"additionalTrustedCA":{"name":"registry-cas"}}}'

- name: Apply MachineConfig for registry cert
  kubernetes.core.k8s:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    state: present
    definition:
      apiVersion: machineconfiguration.openshift.io/v1
      kind: MachineConfig
      metadata:
        labels:
          machineconfiguration.openshift.io/role: master
        name: 99-registry-ca
      spec:
        config:
          ignition:
            version: 3.2.0
          storage:
            files:
            - contents:
                source: "data:text/plain;charset=utf-8;base64,{{ lookup('file', '/opt/registry/certs/registry-cert.pem') | b64encode }}"
              mode: 0644
              overwrite: true
              path: /etc/pki/ca-trust/source/anchors/infra-5g-deployment-lab.pem

- name: Configure DNS forwarding for lab domain
  ansible.builtin.shell: |
    export KUBECONFIG=/home/{{ student_name }}/hub-kubeconfig
    oc patch dns.operator.openshift.io default --type merge \
      -p '{"spec":{"servers":[{"name":"lab-dns","zones":["{{ lab_network_domain }}"],"forwardPlugin":{"upstreams":["{{ ansible_default_ipv4.gateway }}"]}}]}}'

- name: Wait for MCO rollout
  ansible.builtin.shell: |
    export KUBECONFIG=/home/{{ student_name }}/hub-kubeconfig
    for i in $(seq 1 60); do
      UPDATING=$(oc get mcp master -o jsonpath='{.status.conditions[?(@.type=="Updating")].status}')
      UPDATED=$(oc get mcp master -o jsonpath='{.status.conditions[?(@.type=="Updated")].status}')
      if [ "$UPDATING" = "False" ] && [ "$UPDATED" = "True" ]; then
        echo "MCO rollout complete"
        exit 0
      fi
      echo "Waiting for MCO rollout... ($i/60)"
      sleep 30
    done
    echo "MCO rollout timed out"
  register: mco_result
  changed_when: false

# ── Gitea ──

- name: Ensure git server folder exists
  ansible.builtin.file:
    path: /opt/gitea/
    state: directory
    owner: 1000
    group: 1000
    mode: "0755"

- name: Ensure git server config file exists
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/{{ repo_user }}/5g-ran-deployments-on-ocp-lab/{{ lab_version }}/lab-materials/lab-env-data/gitea/podman-gitea.service"
    dest: "/etc/systemd/system/podman-gitea.service"
    mode: "0644"
  retries: 5
  delay: 10

- name: Fix Gitea service for Troshka (net host, no port 2222, official image)
  ansible.builtin.replace:
    path: /etc/systemd/system/podman-gitea.service
    regexp: "{{ item.regexp }}"
    replace: "{{ item.replace }}"
  loop:
    - {regexp: '-p 3000:3000 -p 2222:22', replace: '--net host --security-opt label=disable -e GITEA__server__HTTP_PORT=3000'}
    - {regexp: 'quay.io/mavazque/gitea:1.17.3', replace: 'docker.io/gitea/gitea:1.21'}

- name: Ensure git server service is enabled and running
  ansible.builtin.systemd:
    state: restarted
    daemon_reload: true
    enabled: true
    name: podman-gitea

- name: Wait for Gitea API
  ansible.builtin.uri:
    url: http://localhost:3000/api/v1/version
    method: GET
  register: gitea_check
  until: gitea_check.status == 200
  retries: 30
  delay: 5

- name: Ensure gitea admin user is created
  ansible.builtin.shell:
    cmd: podman exec --user 1000 gitea /bin/sh -c 'gitea admin user create --username student --password {{ common_password }} --email student@5g-deployment.lab --must-change-password=false --admin'  # pragma: allowlist secret
  retries: 5
  delay: 10
  register: gitea_user_result
  until: gitea_user_result.rc == 0 or "user already exists" in gitea_user_result.stdout
  failed_when: gitea_user_result.rc != 0 and "user already exists" not in gitea_user_result.stdout

- name: Ensure github repos are copied to gitea
  ansible.builtin.uri:
    url: http://localhost:3000/api/v1/repos/migrate
    user: student
    password: "{{ common_password }}"
    method: POST
    body: '{"service":"2","clone_addr":"{{ item.repo_url }}","uid":1,"repo_name":"{{ item.repo_name }}"}'
    body_format: json
    return_content: true
    force_basic_auth: true
  register: result
  until: >-
    result.status == 201 or
    (result.json is defined and
     result.json.message is defined and
     "The repository with the same name already exists" in result.json.message)
  retries: 10
  delay: 10
  failed_when: >-
    result.status != 201 and
    (result.json is not defined or
     result.json.message is not defined or
     "The repository with the same name already exists" not in result.json.message)
  loop:
    - {repo_url: "https://github.com/{{ repo_user }}/5g-ran-deployments-on-ocp-lab.git", repo_name: "5g-ran-deployments-on-ocp-lab"}

# ── MinIO ──

- name: Ensure S3 storage config files exist
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/{{ repo_user }}/5g-ran-deployments-on-ocp-lab/{{ lab_version }}/lab-materials/lab-env-data/minio/podman-minio.service"
    dest: "/etc/systemd/system/podman-minio.service"
    mode: "0644"
  retries: 5
  delay: 10

- name: Ensure s3 folder exist
  ansible.builtin.file:
    path: /opt/minio/s3-volume
    state: directory
    mode: "0755"

- name: Ensure s3 storage service is enabled and running
  ansible.builtin.systemd:
    state: restarted
    daemon_reload: true
    enabled: true
    name: podman-minio

- name: Download S3 mc client
  ansible.builtin.get_url:
    url: https://dl.min.io/client/mc/release/linux-amd64/mc
    dest: /usr/bin/mc
    mode: "0744"

- name: Create S3 alias
  ansible.builtin.shell:
    cmd: mc alias set minio http://192.168.125.1:9002 admin admin1234
  retries: 3
  delay: 10
  register: s3_result
  until: s3_result.rc == 0
  changed_when: s3_result.rc == 0

- name: Create S3 buckets
  ansible.builtin.shell:
    cmd: "mc mb minio/{{ item.name }}"
  loop:
    - {name: "sno-abi"}
    - {name: "sno-ibi"}
    - {name: "logs"}
    - {name: "multiclusterobservability"}
  register: bucket_result
  failed_when: bucket_result.rc != 0 and "already" not in bucket_result.stderr
  changed_when: bucket_result.rc == 0

# ── User setup ──

- name: Setup admin password
  ansible.builtin.set_fact:
    strong_admin_password: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
    strong_dev_password: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
    strong_lab_password: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"

- name: Write password to a file
  ansible.builtin.copy:
    content: "{{ item.password }}"
    dest: "{{ item.dest }}"
  loop:
    - {dest: "/home/{{ student_name }}/cred-admin.txt", password: "{{ strong_admin_password }}"}
    - {dest: "/home/{{ student_name }}/cred-dev.txt", password: "{{ strong_dev_password }}"}

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0700'
    owner: "{{ item.owner }}"
  loop:
    - {path: "/home/{{ student_name }}/.ssh", owner: "{{ student_name }}"}
    - {path: "/root/.ssh", owner: "root"}

- name: Ensure ssh-key exists
  community.crypto.openssh_keypair:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
  loop:
    - {path: "/home/{{ student_name }}/.ssh/id_rsa", owner: "{{ student_name }}"}
    - {path: "/root/.ssh/id_rsa", owner: "root"}

- name: Ensure lab-user exists
  ansible.builtin.user:
    name: lab-user

- name: Ensure Git settings are configured for lab-user
  community.general.git_config:
    name: "{{ item.parameter }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - {parameter: "user.email", value: "student@5g-deployment.lab"}
    - {parameter: "user.name", value: "Student"}
  become: true
  become_user: lab-user

# ── Stub files for workload.yml compatibility ──

- name: Create hub.yml stub
  ansible.builtin.copy:
    dest: /root/hub.yml
    content: |
      plan: hub-cluster
      disconnected_update: false
      disconnected: false
      cluster: hub
      domain: {{ lab_network_domain }}

- name: Copy kubeconfig to kcli location
  ansible.builtin.copy:
    src: /home/cloud-user/ocp-install/auth/kubeconfig
    dest: /root/.kcli/clusters/hub/auth/kubeconfig
    remote_src: true
    owner: root

- name: Create kcli clusters directory
  ansible.builtin.file:
    path: /root/.kcli/clusters/hub/auth
    state: directory
    mode: '0755'

- name: pre_workload tasks complete
  debug:
    msg: "Pre-Workload tasks completed successfully."
  when: not silent|bool
