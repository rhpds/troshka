apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: troshkavms.troshka.redhat.com
spec:
  group: troshka.redhat.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [vmId, name, cpus, memory]
              properties:
                vmId:
                  type: string
                name:
                  type: string
                cpus:
                  type: integer
                memory:
                  type: integer
                firmware:
                  type: string
                  enum: [bios, uefi, uefi-secure]
                  default: bios
                machineType:
                  type: string
                  enum: [q35, i440fx]
                  default: q35
                smbiosUuid:
                  type: string
                powerOnAtDeploy:
                  type: boolean
                  default: true
                bootOrder:
                  type: array
                  items:
                    x-kubernetes-preserve-unknown-fields: true
                disks:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                nics:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                cloudInit:
                  type: object
                  properties:
                    userData:
                      type: string
                    networkConfig:
                      type: string
                bmcEnabled:
                  type: boolean
                  default: false
                cdrom:
                  type: object
                  properties:
                    libraryIsoId:
                      type: string
                    s3Path:
                      type: string
                guestfishCommands:
                  type: array
                  items:
                    type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: State
          type: string
          jsonPath: .status.state
        - name: VM Name
          type: string
          jsonPath: .spec.name
  scope: Namespaced
  names:
    plural: troshkavms
    singular: troshkavm
    kind: TroshkaVM
    shortNames: [tvm]
