apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: troshka-network-pods
allowPrivilegedContainer: false
allowHostNetwork: false
allowHostPorts: false
allowHostDirVolumePlugin: false
allowHostPID: false
allowHostIPC: false
allowedCapabilities:
  - NET_ADMIN
  - NET_RAW
defaultAddCapabilities: []
requiredDropCapabilities:
  - KILL
  - MKNOD
  - SETUID
  - SETGID
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - downwardAPI
users: []
groups: []
